name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "nuitka>=2.5" ordered-set zstandard

      - name: Create Nuitka entrypoint
        shell: python
        run: |
          from pathlib import Path
          Path("build").mkdir(exist_ok=True)
          Path("build/tembench_entry.py").write_text(
              "from tembench.cli import app\n\n"
              "if __name__ == '__main__':\n"
              "    app()\n",
              encoding="utf-8",
          )

      - name: Build onefile executable
        run: >
          python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --output-dir=dist
          --output-filename=tembench
          --include-package=tembench
          --include-package-data=altair
          build/tembench_entry.py

      - name: Package artifact
        shell: python
        run: |
          import glob
          import os
          import shutil
          import sys
          from pathlib import Path

          runner_os = os.environ["RUNNER_OS"]
          expected = {
              "Windows": "dist/tembench.exe",
              "Linux": "dist/tembench",
              "macOS": "dist/tembench",
          }[runner_os]

          src_candidates = [expected] if os.path.isfile(expected) else []
          if not src_candidates:
              src_candidates = [
                  p for p in sorted(glob.glob("dist/tembench*"))
                  if os.path.isfile(p) and not p.endswith((".cmd", ".ps1"))
              ]
          if not src_candidates:
              print("No binary found to package")
              sys.exit(1)

          src = src_candidates[0]
          release_dir = Path("release")
          release_dir.mkdir(exist_ok=True)

          os_slug = runner_os.lower()
          ext = ".exe" if runner_os == "Windows" else ""
          dst = release_dir / f"tembench-{os_slug}{ext}"
          shutil.copy2(src, dst)
          if runner_os != "Windows":
              dst.chmod(0o755)
          print(f"Packaged artifact: {dst}")

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tembench-${{ runner.os }}
          path: release/tembench-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release
          merge-multiple: true

      - name: List downloaded files
        run: ls -R ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release/tembench-*
