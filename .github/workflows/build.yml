name: Build Nuitka Executables

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "nuitka>=2.5" ordered-set zstandard

      - name: Create Nuitka entrypoint  
        shell: python
        run: |
          from pathlib import Path
          Path("build").mkdir(exist_ok=True)
          # Create a standalone entry point script
          Path("build/tembench_entry.py").write_text(
              "#!/usr/bin/env python3\n"
              "# -*- coding: utf-8 -*-\n"
              "import sys\n"
              "if __name__ == '__main__':\n"
              "    from tembench.cli import app\n"
              "    app()\n",
              encoding="utf-8",
          )

      - name: Build onefile executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: >
          python -m nuitka
          --onefile
          --assume-yes-for-downloads
          --output-dir=dist
          --output-filename=tembench
          --include-package=tembench
          --include-package-data=altair
          --enable-plugin=anti-bloat
          build/tembench_entry.py

      - name: Build standalone executable (Windows)
        if: runner.os == 'Windows'
        run: >
          python -m nuitka
          --standalone
          --assume-yes-for-downloads
          --output-dir=dist
          --output-filename=tembench
          --include-package=tembench
          --include-package-data=altair
          --enable-plugin=anti-bloat
          --windows-console-mode=force
          --mingw64
          build/tembench_entry.py

      - name: Verify built executable
        shell: python
        run: |
          import os
          import subprocess
          import sys
          from pathlib import Path

          sys.stdout.reconfigure(encoding="utf-8")
          sys.stderr.reconfigure(encoding="utf-8")

          runner_os = os.environ["RUNNER_OS"]
          expected_candidates = {
              "Windows": [
                  "dist/tembench.dist/tembench.exe",
                  "dist/tembench.exe",
              ],
              "Linux": ["dist/tembench"],
              "macOS": ["dist/tembench"],
          }[runner_os]

          candidates = [p for p in expected_candidates if os.path.isfile(p)]
          if not candidates:
              wanted_name = "tembench.exe" if runner_os == "Windows" else "tembench"
              candidates = [
                  str(p)
                  for p in sorted(Path("dist").rglob(wanted_name))
                  if p.is_file() and not str(p).endswith((".cmd", ".ps1"))
              ]
          if not candidates:
              print("No built executable found in dist/")
              sys.exit(1)

          exe = candidates[0]
          print(f"Using executable: {exe}")
          env = os.environ.copy()
          env.setdefault("PYTHONUTF8", "1")
          env.setdefault("PYTHONIOENCODING", "utf-8")
          env.setdefault("NO_COLOR", "1")

          smoke_tests = [["--help"]]
          if runner_os == "Windows":
              # On Windows runners, Rich/console detection for --help can be flaky
              # when executed under captured pipes, so keep a second startup probe.
              smoke_tests.append(["sysinfo"])

          last_result = None
          for args in smoke_tests:
              print(f"Running smoke test: {exe} {' '.join(args)}")
              result = subprocess.run(
                  [exe, *args],
                  capture_output=True,
                  text=True,
                  encoding="utf-8",
                  errors="replace",
                  timeout=60,
                  env=env,
              )
              print(result.stdout[:8000])
              if result.returncode == 0:
                  last_result = result
                  break
              print(result.stderr[:8000])
              print(f"Smoke test failed with exit code {result.returncode}")
              last_result = result

          if last_result is None or last_result.returncode != 0:
              sys.exit(1 if last_result is None else last_result.returncode)

      - name: Package artifact
        shell: python
        run: |
          import glob
          import os
          import shutil
          import sys
          from pathlib import Path

          runner_os = os.environ["RUNNER_OS"]
          release_dir = Path("release")
          release_dir.mkdir(exist_ok=True)
          os_slug = runner_os.lower()

          # Windows uses standalone mode: package the full dist directory.
          if runner_os == "Windows":
              standalone_dir = Path("dist/tembench.dist")
              if standalone_dir.is_dir() and (standalone_dir / "tembench.exe").is_file():
                  archive_base = release_dir / "tembench-windows"
                  archive = shutil.make_archive(
                      str(archive_base),
                      "zip",
                      root_dir=standalone_dir.parent,
                      base_dir=standalone_dir.name,
                  )
                  print(f"Packaged artifact: {archive}")
                  sys.exit(0)

          expected = {
              "Windows": "dist/tembench.exe",
              "Linux": "dist/tembench",
              "macOS": "dist/tembench",
          }[runner_os]

          src_candidates = [expected] if os.path.isfile(expected) else []
          if not src_candidates:
              src_candidates = [
                  p for p in sorted(glob.glob("dist/tembench*"))
                  if os.path.isfile(p) and not p.endswith((".cmd", ".ps1"))
              ]
          if not src_candidates:
              print("No binary found to package")
              sys.exit(1)

          src = src_candidates[0]
          ext = ".exe" if runner_os == "Windows" else ""
          dst = release_dir / f"tembench-{os_slug}{ext}"
          shutil.copy2(src, dst)
          if runner_os != "Windows":
              dst.chmod(0o755)
          print(f"Packaged artifact: {dst}")

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tembench-${{ runner.os }}
          path: release/tembench-*
          if-no-files-found: error
